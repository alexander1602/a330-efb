<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A330 Trim EFB</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent: #0a84ff;
            --accent-hover: #0070e0;
            --success: #30d158;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .efb-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            width: 100%;
            background-color: var(--input-bg);
            border: none;
            color: var(--text-main);
            font-size: 20px;
            padding: 15px;
            border-radius: 14px;
            box-sizing: border-box;
            outline: none;
            transition: box-shadow 0.2s;
        }

        input[type="number"]:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        /* Segmented Control per i Flap */
        .flap-selector {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 12px;
            overflow: hidden;
            padding: 3px;
        }

        .flap-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 500;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .flap-btn.active {
            background-color: #3a3a3c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .calc-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calc-btn:active {
            background-color: var(--accent-hover);
            transform: scale(0.98);
        }

        /* Box del Risultato */
        .result-box {
            margin-top: 25px;
            background-color: #1e3a29; /* Sfondo verdognolo stile cockpit */
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            display: none;
            border: 1px solid #285438;
        }

        .result-box.show {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .result-label {
            color: var(--success);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .mcdu-string {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            font-family: monospace;
            letter-spacing: 2px;
            margin: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="efb-card">
        <h2>A330 Trim Calculator</h2>

        <div class="input-group">
            <label>Gross Weight (KG)</label>
            <input type="number" id="weight" placeholder="es. 168300" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>Center of Gravity (CG %)</label>
            <input type="number" id="cg" placeholder="es. 26.9" step="0.1" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>Flap Setting</label>
            <div class="flap-selector">
                <button class="flap-btn active" onclick="selectFlap('1', this)">1+F</button>
                <button class="flap-btn" onclick="selectFlap('2', this)">2</button>
                <button class="flap-btn" onclick="selectFlap('3', this)">3</button>
            </div>
        </div>

        <button class="calc-btn" onclick="calculateTrim()">Calcola MCDU</button>

        <div class="result-box" id="resultArea">
            <div class="result-label">Stringa MCDU (THS)</div>
            <p class="mcdu-string" id="mcduResult">1/UP0.0</p>
        </div>
    </div>

    <script>
        let currentFlap = '1';

        // Gestisce il cambio visivo e logico dei flap
        function selectFlap(flapValue, btnElement) {
            currentFlap = flapValue;
            
            // Rimuove la classe attiva da tutti i bottoni
            let buttons = document.getElementsByClassName('flap-btn');
            for(let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            // Aggiunge la classe attiva al bottone cliccato
            btnElement.classList.add('active');
        }

        // Calcola il Trim
        function calculateTrim() {
            let cgInput = document.getElementById('cg').value;
            let cg = parseFloat(cgInput);

            if (isNaN(cg) || cg < 15 || cg > 45) {
                alert("Per favore, inserisci un valore di CG valido (es. 26.9).");
                return;
            }

            // Formula A330 (Lineare)
            let ths_raw = 5.7 - (0.2 * cg);
            
            // Compensazione Flap
            if (currentFlap === '2') {
                ths_raw += 0.2;
            } else if (currentFlap === '3') {
                ths_raw += 0.3;
            }

            // Determina UP o DN
            let direction = "";
            if (ths_raw > 0) {
                direction = "UP";
            } else if (ths_raw < 0) {
                direction = "DN";
            } else {
                direction = "UP"; // Di default neutro lo mettiamo positivo
            }

            let ths_val = Math.abs(ths_raw).toFixed(1);
            
            // Costruisci la stringa per l'MCDU
            let mcduStr = currentFlap + "/" + direction + ths_val;

            // Mostra il risultato con l'animazione
            document.getElementById('mcduResult').innerText = mcduStr;
            document.getElementById('resultArea').classList.add('show');
        }
    </script>
</body>
</html>
