<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>A330 Pro EFB</title>
    <style>
        :root {
            --bg-color: #000000; --card-bg: #1c1c1e; --input-bg: #2c2c2e;
            --text-main: #ffffff; --text-muted: #8e8e93; --accent: #0a84ff;
            --accent-hover: #0070e0; --success: #30d158; --warning: #ff9f0a; --danger: #ff453a;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; padding-bottom: 90px; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .split-layout { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) {
            .split-layout { flex-direction: row; align-items: stretch; }
            .left-panel { flex: 1; max-width: 50%; }
            .right-panel { flex: 1; display: flex; flex-direction: column; }
        }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease-out; }
        .view.active { display: block; }
        .efb-card {
            background-color: var(--card-bg); border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        h2 { margin-top: 0; font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 25px; letter-spacing: 0.5px; }
        h3 { font-size: 13px; color: var(--accent); text-transform: uppercase; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        
        label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input[type="number"], select {
            width: 100%; background-color: var(--input-bg); border: none; color: var(--text-main);
            font-size: 18px; padding: 12px; border-radius: 12px; box-sizing: border-box; outline: none; text-align: center;
        }
        input[type="number"]:focus, select:focus { box-shadow: 0 0 0 2px var(--accent); }

        .segment-control { display: flex; background-color: var(--input-bg); border-radius: 12px; padding: 3px; }
        .segment-btn { flex: 1; background: none; border: none; color: var(--text-main); font-size: 14px; font-weight: 600; padding: 10px 0; border-radius: 10px; cursor: pointer; }
        .segment-btn.active { background-color: #3a3a3c; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .toggle-btn { background-color: var(--input-bg); color: var(--text-muted); border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .toggle-btn.active { background-color: var(--success); color: #000; }

        .calc-btn { width: 100%; background-color: var(--accent); color: white; border: none; padding: 16px; font-size: 18px; font-weight: 600; border-radius: 14px; margin-top: 10px; cursor: pointer; }
        .calc-btn:active { transform: scale(0.98); }

        .result-box { margin-top: 25px; background-color: #1e3a29; border-radius: 16px; padding: 20px; text-align: center; display: none; border: 1px solid #285438; }
        .result-box.show { display: block; }
        .mcdu-string { font-size: 30px; font-weight: 700; font-family: monospace; margin: 5px 0 0 0; }
        canvas { width: 100%; flex-grow: 1; min-height: 250px; background-color: var(--input-bg); border-radius: 14px; display: block; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-icon { font-size: 24px; margin-bottom: 4px; }
        
        .perf-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .perf-item { background: var(--card-bg); padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .perf-val { font-size: 28px; font-weight: 700; font-family: monospace; color: var(--success);}
        .notes-list { text-align: left; font-size: 13px; color: var(--warning); margin-top: 10px; line-height: 1.4; padding-left: 20px;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="view-trim" class="view active">
        <div class="container split-layout">
            <div class="efb-card left-panel">
                <h2>Weight & Balance</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label>TOW (KG)</label>
                        <input type="number" id="weight" placeholder="168300" onchange="syncData()">
                    </div>
                    <div class="input-group">
                        <label>CG (% MAC)</label>
                        <input type="number" id="cg" placeholder="26.9" step="0.1" onchange="syncData()">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Flap Setting</label>
                    <div class="segment-control">
                        <button class="segment-btn active" onclick="selectOpt('flap', '1', this)">1+F</button>
                        <button class="segment-btn" onclick="selectOpt('flap', '2', this)">2</button>
                        <button class="segment-btn" onclick="selectOpt('flap', '3', this)">3</button>
                    </div>
                </div>
                <button class="calc-btn" onclick="calculateTrim()">Calcola Trim</button>
                <div class="result-box" id="trimResultArea">
                    <label style="color: var(--success);">THS SETTING (MCDU)</label>
                    <p class="mcdu-string" id="mcduResult">1/UP0.0</p>
                </div>
            </div>
            <div class="efb-card right-panel">
                <h2>CG Envelope</h2>
                <canvas id="cgCanvas"></canvas>
            </div>
        </div>
    </div>

    <div id="view-perf" class="view">
        <div class="container split-layout">
            <div class="left-panel">
                
                <div class="efb-card" style="padding: 15px 20px; margin-bottom: 15px;">
                    <h3>Aircraft Config & Bleed</h3>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Packs</label>
                            <button class="toggle-btn active" id="btn-packs" onclick="toggleState('packs', this)">ON</button>
                        </div>
                        <div class="input-group">
                            <label>Engine Anti-Ice</label>
                            <button class="toggle-btn" id="btn-antiice" onclick="toggleState('antiice', this)">OFF</button>
                        </div>
                    </div>
                </div>

                <div class="efb-card" style="padding: 15px 20px; margin-bottom: 15px;">
                    <h3>Weather & Env</h3>
                    <div class="form-grid">
                        <div class="input-group"><label>OAT (°C)</label><input type="number" id="oat" value="15"></div>
                        <div class="input-group"><label>QNH (hPa)</label><input type="number" id="qnh" value="1013"></div>
                        <div class="input-group"><label>Elev (FT)</label><input type="number" id="elev" value="0"></div>
                        <div class="input-group">
                            <label>Wind (KTS)</label>
                            <div style="display:flex; gap:5px;">
                                <input type="number" id="wind" value="0" style="width:50%;">
                                <select id="wind-dir" style="width:50%;"><option value="HW">HD</option><option value="TW">TL</option></select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="efb-card" style="padding: 15px 20px;">
                    <h3>Runway Details</h3>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Condition</label>
                            <select id="rwy-cond">
                                <option value="DRY">DRY</option>
                                <option value="WET">WET</option>
                                <option value="CONT">CONTAM</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Length (m)</label><input type="number" id="rwy-len" value="3000"></div>
                        <div class="input-group"><label>Slope (%)</label><input type="number" id="rwy-slope" value="0" step="0.1" placeholder="- giù, + su"></div>
                    </div>
                    <button class="calc-btn" onclick="calculatePerf()">Calculate</button>
                </div>
            </div>

            <div class="efb-card right-panel">
                <h2>Takeoff Data</h2>
                <div class="result-box" id="perfResultArea" style="display: block; background: none; border: none; margin-top:0; padding:0;">
                    <div class="perf-grid">
                        <div class="perf-item"><label>V1</label><div class="perf-val" id="val-v1">---</div></div>
                        <div class="perf-item"><label>VR</label><div class="perf-val" id="val-vr">---</div></div>
                        <div class="perf-item"><label>V2</label><div class="perf-val" id="val-v2">---</div></div>
                    </div>
                    
                    <div style="margin-top: 20px; background: var(--input-bg); padding: 20px; border-radius: 12px; text-align: center;">
                        <label>Thrust Setting</label>
                        <p class="mcdu-string" id="thrustResult" style="font-size: 36px; color: var(--warning);">---</p>
                    </div>
                    
                    <div style="margin-top: 15px; background: rgba(255, 69, 58, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 69, 58, 0.3);">
                        <label style="color: var(--danger); font-size: 13px;">EFB Limitations & Notes</label>
                        <ul class="notes-list" id="perf-notes"><li>Inserisci i dati e calcola.</li></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" id="tab-trim" onclick="switchView('trim')"><div class="tab-icon">⚖️</div>Trim & CG</div>
        <div class="tab-item" id="tab-perf" onclick="switchView('perf')"><div class="tab-icon">🚀</div>Performance</div>
    </nav>

    <script>
        let state = { flap: '1', packs: true, antiice: false };

        window.onload = function() { drawCGGraph(); };
        window.onresize = function() {
            let w = document.getElementById('weight').value, cg = document.getElementById('cg').value;
            if(w && cg && document.getElementById('trimResultArea').classList.contains('show')) drawCGGraph(parseFloat(cg), parseFloat(w));
            else drawCGGraph();
        };

        function switchView(view) {
            document.querySelectorAll('.view, .tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('tab-' + view).classList.add('active');
            if(view === 'trim') setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
            syncData();
        }

        function syncData() {
            // Niente campi doppi per il peso, la logica prende il valore dal campo in Trim
        }

        function selectOpt(key, val, btn) {
            state[key] = val;
            Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleState(key, btn) {
            state[key] = !state[key];
            btn.innerText = state[key] ? "ON" : "OFF";
            btn.classList.toggle('active', state[key]);
        }

        // --- CALCOLO TRIM ---
        function calculateTrim() {
            let weight = parseFloat(document.getElementById('weight').value);
            let cg = parseFloat(document.getElementById('cg').value);
            if (isNaN(cg) || isNaN(weight)) { alert("Inserisci TOW e CG."); return; }

            let ths_raw = 5.7 - (0.2 * cg);
            if (state.flap === '2') ths_raw += 0.2;
            else if (state.flap === '3') ths_raw += 0.3;

            let direction = ths_raw >= 0 ? "UP" : "DN";
            document.getElementById('mcduResult').innerText = `${state.flap}/${direction}${Math.abs(ths_raw).toFixed(1)}`;
            document.getElementById('trimResultArea').classList.add('show');
            drawCGGraph(cg, weight);
        }

        function drawCGGraph(cg = null, weight = null) {
            let canvas = document.getElementById('cgCanvas'), ctx = canvas.getContext('2d');
            let w = canvas.width = canvas.offsetWidth, h = canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, w, h);
            let mapX = (val) => ((val - 15) / 25) * w, mapY = (val) => h - (((val - 100000) / 150000) * h);

            ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1;
            for(let i=15; i<=40; i+=5) { ctx.beginPath(); ctx.moveTo(mapX(i), 0); ctx.lineTo(mapX(i), h); ctx.stroke(); }
            for(let j=100000; j<=250000; j+=250000) { ctx.beginPath(); ctx.moveTo(0, mapY(j)); ctx.lineTo(w, mapY(j)); ctx.stroke(); }

            ctx.fillStyle = "rgba(10,132,255,0.15)"; ctx.strokeStyle = "rgba(10,132,255,0.8)"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(mapX(17), mapY(100000)); ctx.lineTo(mapX(17), mapY(180000));
            ctx.lineTo(mapX(20), mapY(240000)); ctx.lineTo(mapX(33), mapY(240000)); ctx.lineTo(mapX(37), mapY(100000)); ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.fillStyle = "#8e8e93"; ctx.font = "12px sans-serif"; ctx.fillText("FWD", 10, h - 10); ctx.fillText("AFT", w - 30, h - 10);

            if (cg && weight) {
                let uX = mapX(cg), uY = mapY(weight);
                ctx.fillStyle = "#ff453a"; ctx.beginPath(); ctx.arc(uX, uY, 6, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif"; ctx.fillText(`CG: ${cg}%`, uX + 10, uY - 10);
            }
        }

        // --- CALCOLO PERFORMANCE (Modello Fisico Approssimato) ---
        function calculatePerf() {
            let weight = parseFloat(document.getElementById('weight').value);
            let cg = parseFloat(document.getElementById('cg').value);
            if (isNaN(weight)) { alert("Inserisci il TOW nella scheda Trim."); switchView('trim'); return; }

            let oat = parseFloat(document.getElementById('oat').value) || 15;
            let elev = parseFloat(document.getElementById('elev').value) || 0;
            let windKts = parseFloat(document.getElementById('wind').value) || 0;
            let windDir = document.getElementById('wind-dir').value;
            let rwyCond = document.getElementById('rwy-cond').value;
            let rwyLen = parseFloat(document.getElementById('rwy-len').value) || 3000;
            let rwySlope = parseFloat(document.getElementById('rwy-slope').value) || 0;

            let notes = [];

            // 1. Density Altitude
            let pressAlt = elev; // Semplificato
            let isaDev = oat - (15 - (elev / 1000) * 2);

            // 2. VR (Rotation Speed) - Dipende da Peso e Flap
            let vr = 140 + ((weight - 170000) / 3000);
            if (state.flap === '2') vr -= 3;
            if (state.flap === '3') vr -= 6;
            
            // Influsso Baricentro sulla VR (FWD richiede più velocità per cabrare)
            if (cg && cg < 22) { vr += 2; notes.push("VR aumentata per FWD CG limit."); }
            if (cg && cg > 32) { vr -= 2; notes.push("VR ridotta per AFT CG."); }
            
            vr = Math.round(vr);

            // 3. V1 (Decision Speed - Brake Energy & ASDA Limit)
            let v1 = vr - 2;
            if (windDir === 'TW' && windKts > 0) { v1 -= Math.round(windKts / 2); notes.push(`V1 penalizzata per Tailwind (-${Math.round(windKts/2)} kt).`); }
            if (rwySlope < -0.5) { v1 -= 2; notes.push("V1 ridotta per Downhill Slope."); }
            if (rwyCond === 'WET') { v1 -= 6; notes.push("V1 ridotta per Wet Runway limit (ASDA)."); }
            if (rwyCond === 'CONT') { v1 -= 12; notes.push("ATTENZIONE: V1 severamente ridotta per pista contaminata."); }
            
            // Limitazioni di lunghezza pista
            if (rwyLen < 2500) { v1 -= 4; notes.push("Short Runway Limit: V1 abbassata."); }
            if (weight > 230000 && rwyLen < 2800) { v1 -= 5; notes.push("Brake Energy Limit vicino al max."); }

            v1 = Math.round(v1);

            // 4. V2 (Safety Speed - Climb Limit)
            let v2 = Math.round(vr + 5);
            if (isaDev > 10) { v2 += 2; notes.push("V2 incrementata per High Temp / Climb limit."); }
            if (state.antiice) { v2 += 2; }

            // Safe Limits
            if (v1 < 120) v1 = 120; if (vr < 125) vr = 125; if (v2 < 130) v2 = 130;
            if (v1 > vr) v1 = vr;

            // 5. FLEX / THRUST CALCULATION (Bleed Configuration)
            let thrustStr = "";
            let thrustColor = "var(--success)";

            // Check for Hard TOGA limitations
            if (rwyCond === 'CONT' || rwyCond === 'WET' || weight > 230000 || rwyLen < 2200) {
                thrustStr = "TOGA"; thrustColor = "var(--danger)";
                if (rwyCond !== 'DRY') notes.push("FLEX NON AUTORIZZATA: Pista non asciutta.");
                if (weight > 230000) notes.push("FLEX NON AUTORIZZATA: Heavy Takeoff.");
            } else {
                // Calcolo base Flex
                let flx = 75 - ((weight - 140000) / 2500) - (elev / 2000);
                
                // Bleed penalties
                if (!state.packs) { flx += 3; notes.push("Packs OFF: Performance migliorate (+FLEX)."); }
                if (state.antiice) { flx -= 8; notes.push("Anti-Ice ON: Forte penalità di spinta (-FLEX)."); }
                if (rwyLen < 2600) { flx -= 5; notes.push("FLEX ridotta per pista corta."); }
                
                flx = Math.round(flx);
                
                // ISA / OAT Checks (Tmax limit)
                if (flx <= oat || flx < 42) {
                    thrustStr = "TOGA"; thrustColor = "var(--warning)";
                    notes.push("FLEX calcolata troppo bassa/inferiore a OAT. Usa TOGA.");
                } else {
                    thrustStr = `FLEX ${flx}°C`;
                }
            }

            document.getElementById('val-v1').innerText = v1;
            document.getElementById('val-vr').innerText = vr;
            document.getElementById('val-v2').innerText = v2;
            
            let thrustEl = document.getElementById('thrustResult');
            thrustEl.innerText = thrustStr; thrustEl.style.color = thrustColor;

            let ul = document.getElementById('perf-notes');
            if (notes.length === 0) {
                ul.innerHTML = "<li style='color:var(--success);'>Nessuna limitazione operativa di rilievo.</li>";
            } else {
                ul.innerHTML = notes.map(n => `<li>${n}</li>`).join("");
            }
        }
    </script>
</body>
</html>
